server {
  listen 80;
  server_name your-domain.com;
  root /www/wwwroot/drjoo/dist;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:jpg|jpeg|png|gif|webp|svg|ico|css|js)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
  }
}
